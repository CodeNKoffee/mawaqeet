<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#274c83"/>
      <stop offset="0.5" stop-color="#1b3a63"/>
      <stop offset="1" stop-color="#173a40"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f7da9f"/>
      <stop offset="0.5" stop-color="#eebd63"/>
      <stop offset="1" stop-color="#d99b3e"/>
    </linearGradient>
    <radialGradient id="bloom" cx="0.26" cy="0.18" r="0.8">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.22"/>
      <stop offset="0.55" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <clipPath id="squircle">
      <rect x="80" y="80" width="864" height="864" rx="200" ry="200"/>
    </clipPath>
    <pattern id="lattice" width="64" height="64" patternUnits="userSpaceOnUse">
      <g fill="none" stroke="#ffffff" stroke-width="2" opacity="0.06">
        <rect x="0" y="0" width="64" height="64"/>
        <path d="M32 0 L64 32 L32 64 L0 32 Z"/>
      </g>
    </pattern>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
  </defs>

  <!-- squircle background -->
  <g clip-path="url(#squircle)">
    <rect x="80" y="80" width="864" height="864" fill="url(#bg)"/>
    <rect x="80" y="80" width="864" height="864" fill="url(#lattice)"/>
    <rect x="80" y="80" width="864" height="864" fill="url(#bloom)"/>
  </g>
  <rect x="80" y="80" width="864" height="864" rx="200" ry="200" fill="none"
        stroke="#ffffff" stroke-opacity="0.10" stroke-width="2"/>

  <!-- gold mark: crescent finial + onion dome + plinth -->
  <g fill="url(#gold)" filter="url(#soft)">
    <!-- finial sphere + crescent -->
    <circle cx="512" cy="232" r="22"/>
    <path d="M512 150
             a52 52 0 1 0 40 86
             a40 40 0 1 1 -40 -86 z"/>
    <!-- onion dome -->
    <path d="M330 612
             C330 452 372 296 512 262
             C652 296 694 452 694 612 Z"/>
    <!-- drum -->
    <rect x="306" y="612" width="412" height="64" rx="20"/>
    <!-- plinth -->
    <rect x="262" y="676" width="500" height="60" rx="22"/>
  </g>

  <!-- mihrab arch (negative space) inside the dome -->
  <path d="M452 676 v-150 a60 60 0 0 1 120 0 v150 z" fill="#1b3a63"/>
</svg>
