# Builds Mawaqeet for macOS, Windows and Linux from a single tag.
# Push a tag like v0.1.0 (or run manually) to produce installers as artifacts.
#
#   git tag v0.1.0 && git push origin v0.1.0
#
# Each runner builds its own native target — the only reliable way to make
# Windows (.exe/NSIS) and Linux (.AppImage/.deb) alongside macOS.

name: build

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write # needed to publish releases

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            cmd: dist:mac
          - os: windows-latest
            cmd: dist:win
          - os: ubuntu-latest
            cmd: dist:linux
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install Linux packaging deps
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y rpm fakeroot
      - run: npm ci
      - name: Build
        run: npm run ${{ matrix.cmd }}
        env:
          # Unsigned CI builds. Add signing secrets for public releases.
          CSC_IDENTITY_AUTODISCOVERY: "false"
      - uses: actions/upload-artifact@v4
        with:
          name: mawaqeet-${{ matrix.os }}
          path: |
            dist/*.zip
            dist/*.dmg
            dist/*.exe
            dist/*.AppImage
            dist/*.deb
          if-no-files-found: ignore
      # On a version tag, attach this platform's installers to the GitHub Release
      # so the website's download links (releases/latest) resolve.
      - name: Publish to Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.zip
            dist/*.dmg
            dist/*.exe
            dist/*.AppImage
            dist/*.deb
          fail_on_unmatched_files: false
